<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia JS</title>
</head>
<body>
    <h1>Farmacia js</h1>
    <form>
        
        <p>
            Medicamento:
            <input type="text" id="idmedi" placeholder="Aspirina" required>
        </p>
        <p>
            Preço R$:
            <input type="number" step="0.01"  id="idvalor" placeholder="12.90" required>
        </p>
        <input type="submit" value="Mostra Promoção">
    </form>
    <h2>Promoção De Medicamento</h2>
    <h3></h3>

    <script>
        /*Ex:
        Uma farmacia esta com promoção-Na compra de duas unidades de um mesmo medicamento ,o cliente recebe como desconto os centavos do valor total.
        Elaborar um programa que leia a descrição e preço de um medicamento.
        Informe o valor do produto na promoção.

        */
        
        const frm =document.querySelector("form")
        const medic = document.querySelector("h2")
        const promo = document.querySelector("h3")
        
        frm.addEventListener("submit" ,(e) =>{
            med =frm.idmedi.value;
            valor =Number(frm.idvalor.value);

            const promocao =Math.floor(2* valor)

            medic.innerText=`Promoção de:${med}`

            promo.innerText=`Leve 2 Por Apenas: ${promocao.toFixed(2)}`

            e.preventDefault();
        })
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa de cálculo de peso ideal</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <img src="img/Design sem nome (9).png" alt="">
    <h1>Programa Cálculo do Peso Ideal</h1>
    <form action="">
        <p>
            Nome:
            <input type="text" placeholder="Ronaldo" name="nome" id="idnome" required>
        </p>
        <p>
            Sexo:
            <input type="radio" name="sexo" id="idmasculino" required>Masculino
            <input type="radio" name="sexo" id="idfeminino" required>Feminino
        </p>
        <p>
            Altura:
            <input type="number" min="0" step="0.01" id="idaltura" required>
        </p>
        <input type="submit" value="Calculo De Peso Ideal">
        <input type="reset" value="Limpa Campo">
    </form>
    <h3></h3>
    <script src="ex02_4.js"></script>
</body>
</html>
